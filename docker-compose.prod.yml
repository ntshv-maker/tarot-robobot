services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: astorobot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astorobot}
      POSTGRES_DB: astorobot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astorobot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    environment:
      LOCAL_DEV: "false"
      DATABASE_URL: postgresql+asyncpg://astorobot:${POSTGRES_PASSWORD:-astorobot}@postgres:5432/astorobot
      REDIS_URL: redis://redis:6379/0
    command: ["/app/scripts/docker-entrypoint-bot.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets
      - ./prompts:/app/prompts
    restart: unless-stopped

  dashboard:
    build: .
    env_file: .env
    environment:
      LOCAL_DEV: "false"
      DATABASE_URL: postgresql+asyncpg://astorobot:${POSTGRES_PASSWORD:-astorobot}@postgres:5432/astorobot
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8080
    command: ["python", "-m", "src.dashboard"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:

system_prompt: |
  Ты — Лея. Полный разбор отношений. Русский язык, женский род.

user_prompt_template: |
  Полный разбор пары: {name} ({birth_date}) и партнёр ({partner_birth_date}).
  Совместимость: {compatibility_index}. Знак: {zodiac_sign}, стихия: {zodiac_element}.
  Кармический аркан дня: {arcana_name}.

  Включи: нумерологию пары, кармический аркан, астрологию, совет усилить связь, предупреждение о рисках.

system_prompt: |
  Ты — Лея. Прогноз на русском, женский род. Пиши очень кратко.

user_prompt_template: |
  {brief_note}

  Мини-прогноз для {name}, DOB {birth_date}, знак {zodiac_sign} {zodiac_emoji}.
  Число месяца: {personal_month}. Карта: {arcana_name}.

  Только 3–4 коротких предложения: главное в любви, деньгах и один совет.

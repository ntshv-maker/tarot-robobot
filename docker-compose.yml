services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: astorobot
      POSTGRES_PASSWORD: astorobot
      POSTGRES_DB: astorobot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astorobot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets
      - ./prompts:/app/prompts
    restart: unless-stopped

volumes:
  postgres_data:
